<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharanya Demo Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, aquamarine, lightblue);
      text-align: center;
      padding: 200px;
    }
    h1 {
      color: #0077cc;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    a {
      text-decoration: none;
    }
    .btn {
      background-color: #0077cc;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background-color: #0b314d;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Demo Page</h1>
  <p>This is a simple example page. Click the button below to visit Google.</p>
  <a href="http://google.com" target="_blank" class="btn">Go to Google</a>
</body>
</html>
